<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#B45309" />
    <meta name="description" content="BioLens — See what your products are really made of. Search or scan products to reveal petrochemical dependency." />
    
    <!-- PWA Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="BioLens" />
    
    <!-- Icons & Manifest -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    
    <title>BioLens — See What Products Are Made Of</title>
    
    <!-- Safari PerformanceServerTiming Error Fix -->
    <script>
      window.addEventListener("error", function(e) {
        if (e.error instanceof DOMException && 
            e.error.name === "DataCloneError" && 
            e.message && 
            e.message.includes("PerformanceServerTiming")) {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      }, true);
    </script>
  </head>
  
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- Service Worker Cleanup: Forces fresh content for all users -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let registration of registrations) {
            registration.unregister();
            console.log("Service Worker Unregistered - Loading fresh content");
          }
        });
      }
    </script>
  </body>
</html>
