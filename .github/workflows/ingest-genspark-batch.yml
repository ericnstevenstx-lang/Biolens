name: Ingest Genspark Batches

on:
  push:
    paths:
      - 'automation/genspark-output/*.json'
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ingest all batch files
        run: |
          shopt -s nullglob
          for file in automation/genspark-output/*.json; do
            base=$(basename "$file")
            if [ "$base" = "query-manifest.json" ]; then
              continue
            fi

            echo "Posting $file"
            curl -X POST \
              "https://biolens-kappa.vercel.app/api/product-search-ingest" \
              -H "Content-Type: application/json" \
              --data-binary @"$file"
            echo ""
          done
